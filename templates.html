<!DOCTYPE html>
<html>
<head>
    <title>Recipe Sharing Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            font-family: Arial;
            margin:20px;
            background:#f5f5f5;
        }
        .card{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
            box-shadow:0 0 5px rgba(0,0,0,0.1);
        }
        .btn{
            padding:8px 12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
        }
        @media(max-width:600px){
            body{
                margin:10px;
            }
        }
    </style>
</head>

<body>

<h2>Recipe Sharing Platform</h2>

<div class="card">
<h3>Recipe Title</h3>
<p>Description of recipe</p>
<button class="btn">View</button>
</div>

<div class="card">
<h3>Another Recipe</h3>
<p>Ingredients and steps</p>
<button class="btn">View</button>
</div>

</body>
</html>
